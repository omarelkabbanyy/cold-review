name: Quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate PROMPT.min.txt parity
        run: python scripts/generate_min_prompt.py --check
      - name: Run repository checks
        run: python scripts/check_repo.py
